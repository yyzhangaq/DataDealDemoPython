# ---------------------------------------------------------
# 核心版本控制
# ---------------------------------------------------------
version = "1.0"

# ---------------------------------------------------------
# [metadata] 元数据：用于数据治理和难度分级
# ---------------------------------------------------------
[metadata]
author_name = "西安-张莹莹"
author_email = "zhangyingying@example.com"
difficulty = "medium"
category = "software-engineering"
tags = ["python", "csv", "data-cleaning", "cli"]
expert_time_estimate_min = 30.0
junior_time_estimate_min = 120.0

# ---------------------------------------------------------
# [verifier] 验证器配置：控制判题脚本的运行
# ---------------------------------------------------------
[verifier]
timeout_sec = 600.0

# ---------------------------------------------------------
# [agent] Agent配置：控制 AI 的思考和执行时间
# ---------------------------------------------------------
[agent]
timeout_sec = 2400.0

# ---------------------------------------------------------
# [environment] 环境配置：Docker 容器的资源限制
# ---------------------------------------------------------
[environment]
build_timeout_sec = 600.0
docker_image = "csv-cleaner-task:latest"
cpus = 1
memory = "2G"
storage = "10G"