# ---------------------------------------------------------
# 核心版本控制
# ---------------------------------------------------------
version = "1.0" 

# ---------------------------------------------------------
# [metadata] 元数据：用于数据治理和难度分级
# ---------------------------------------------------------
[metadata]
# 你的名字（责任人）
author_name = "Zhang San"
# 你的联系方式（出bug了找谁）
author_email = "zhangsan@example.com"

# 难度分级：easy (入门), medium (进阶), hard (专家)
difficulty = "medium" 

# 任务类别：software-engineering, data-science, cybersecurity, devops
category = "software-engineering"

# 标签：用于后续筛选，比如涉及 python, recursion, algorithm
tags = ["python", "recursion", "interpreter"]

# 【关键指标】专家（人类高手）解决这个问题需要多少分钟？
# 比如你自己写出 solution 花了 30 分钟，就填 30.0
expert_time_estimate_min = 30.0 

# 【关键指标】初级工程师解决这个问题需要多少分钟？
# 通常是专家时间的 3-5 倍
junior_time_estimate_min = 120.0

# ---------------------------------------------------------
# [verifier] 验证器配置：控制判题脚本的运行
# ---------------------------------------------------------
[verifier]
# 运行 tests/test.sh 的最大超时时间（秒）
# 如果验证脚本跑了太久（比如死循环），系统会强制杀掉
timeout_sec = 600.0

# ---------------------------------------------------------
# [agent] Agent配置：控制 AI 的思考和执行时间
# ---------------------------------------------------------
[agent]
# 允许 Agent 尝试解决问题的总时间（秒）
# 比如给它 40 分钟来写代码和调试
timeout_sec = 2400.0

# ---------------------------------------------------------
# [environment] 环境配置：Docker 容器的资源限制
# ---------------------------------------------------------
[environment]
# 构建 Docker 镜像的超时时间（秒）
build_timeout_sec = 600.0

# 【重要】这里通常指向构建好的镜像。
# 在开发阶段，要求候选人填 "local-build" 或者具体的镜像名
# 实际上线时，平台会根据 environment/Dockerfile 自动构建并替换此字段
docker_image = "custom-bench/task-001:v1"

# 限制 CPU 核数，防止 Agent 跑满服务器 CPU
cpus = 1

# 限制内存，防止内存泄漏导致 OOM
memory = "2G"

# 限制磁盘空间，防止 Agent 产生巨量垃圾文件填满硬盘
storage = "10G"