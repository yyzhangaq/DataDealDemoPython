version = "1.0"

[metadata]
author_name = "Zhang Yingying"
author_email = "zhangyingying@example.com"
difficulty = "medium"
category = "data-engineering"
tags = ["python", "cli", "csv", "data-cleaning", "text-processing"]
expert_time_estimate_min = 25.0
junior_time_estimate_min = 90.0

[task]
id = "csv-cleaner-cli"
name = "CSV Data Cleaner CLI"
description = "Build a Python CLI tool to clean messy CSV data"
language = "python"
python_version = "3.11"

[evaluation]
type = "script"
entry = "tests/test.sh"

[evaluation.scoring]
basic_cleaning = { weight = 30, description = "Empty rows removal, whitespace trimming, deduplication" }
encoding_handling = { weight = 20, description = "BOM removal, non-printable character stripping" }
format_normalization = { weight = 20, description = "Date format normalization to ISO 8601" }
structural_repair = { weight = 15, description = "Column count alignment, malformed row handling" }
cli_correctness = { weight = 15, description = "Exit codes, file I/O, argument handling" }

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 2400.0

[environment]
build_timeout_sec = 600.0
docker_image = "custom-bench/csv-cleaner-cli:v1"
dockerfile = "environment/Dockerfile"
initial_files = ["environment/dirty_data.csv"]
cpus = 1
memory = "2G"
storage = "10G"
